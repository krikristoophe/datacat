name: Deploy docs to GitHub Pages

# Déploiement MANUEL pour l'instant : GitHub Pages n'est pas disponible sur ce dépôt privé avec
# le plan actuel ("current plan does not support GitHub Pages"). Pour activer le déploiement
# automatique : rendre le dépôt public (ou passer à un plan compatible), puis dans
# Settings → Pages choisir Source = "GitHub Actions", et enfin restaurer le déclencheur `push`
# ci-dessous (commenté). Le build reste lançable à la main via "Run workflow".
on:
  workflow_dispatch:
  # push:
  #   branches: [master]
  #   paths:
  #     - 'website/**'
  #     - 'docs/**'
  #     - '.github/workflows/docs.yml'

# Allow this workflow to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Astro
        uses: withastro/action@v4
        with:
          path: ./website
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
