name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Rust + PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: datacat
          POSTGRES_PASSWORD: datacat
          POSTGRES_DB: datacat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datacat"
          --health-interval 2s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgres://datacat:datacat@localhost:5432/datacat
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test --all-targets

  sdk-typescript:
    name: SDK TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  sdk-flutter:
    name: SDK Flutter/Dart
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/flutter
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test

  exporter:
    name: Exporter (Rust — build + clippy + fmt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: exporter
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: exporter -> target
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Build
        run: cargo build --release
      # Le test e2e (test_export_events_end_to_end) nécessite MinIO + PostgreSQL.
      # Il est marqué #[tokio::test] (sans #[ignore]) et s'exécute en local via
      # exporter/run-tests.sh qui orchestre les conteneurs Docker.
      # En CI on ne le lance pas pour garder un job rapide et sans dépendances Docker.
      # Pour exécuter le test e2e en local : cd exporter && ./run-tests.sh

  reader:
    name: Reader (Rust — build + clippy + fmt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reader
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reader -> target
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: RUSTFLAGS="-D warnings" cargo clippy --all-targets
      - name: Build
        run: cargo build --release
      # Le test e2e (test_cold_query_end_to_end) nécessite MinIO (Docker).
      # Il s'exécute en local via reader/run-tests.sh.
      # En CI on ne le lance pas pour garder un job rapide sans dépendances Docker.

  audit:
    name: Audit des dépendances (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit (cargo-audit) — backend, exporter, reader
        # RUSTSEC-2023-0071 (rsa — Marvin timing attack) est ignoré avec justification :
        #  - le crate `rsa` n'est tiré QUE comme dépendance optionnelle NON COMPILÉE du méta-crate
        #    `sqlx` (backend MySQL, non activé : default-features=false, features=["postgres",…]).
        #    Il n'apparaît dans aucun graphe de build (`cargo tree -i rsa` est vide), seulement
        #    comme entrée statique du Cargo.lock.
        #  - Datacat ne réalise par ailleurs AUCUNE opération de clé privée RSA : le token est
        #    vérifié par clé publique uniquement. L'attaque vise le timing des opérations de clé
        #    privée → aucun chemin exploitable.
        # Avis sans correctif disponible (cf. RUSTSEC-2023-0071). À revoir si `rsa` entre un jour
        # dans le graphe de build. Les avis informationnels (unmaintained/unsound) sont signalés
        # mais ne font pas échouer le job (comportement par défaut de cargo-audit).
        run: |
          cargo audit --ignore RUSTSEC-2023-0071 --file Cargo.lock
          cargo audit --ignore RUSTSEC-2023-0071 --file exporter/Cargo.lock
          cargo audit --ignore RUSTSEC-2023-0071 --file reader/Cargo.lock

  deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      # Politique unique `deny.toml` (advisories + licenses + sources + bans), appliquée au
      # workspace racine (backend + exporter via dep path) puis au crate `reader` autonome.
      - run: cargo deny check
      - run: cargo deny --manifest-path reader/Cargo.toml --config deny.toml check
